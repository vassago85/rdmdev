# RDM Developments - Production Docker Compose
# Deploy behind Nginx Proxy Manager on the shared `nginx-proxy-manager_default` network.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Copy docker/env.production.example to .env and fill in values
#   2. Ensure `nginx-proxy-manager_default` network exists (created by NPM)
#   3. In NPM, configure a proxy host: rdmdev.co.za -> rdmdev-app:80 (SSL via Let's Encrypt)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: rdmdev-app:latest
    container_name: rdmdev-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rdmdev}
      - DB_USERNAME=${DB_USERNAME:-rdmdev}
      - DB_PASSWORD=${DB_PASSWORD:?Database password required}
    volumes:
      - rdmdev-storage:/var/www/html/storage/app
      - rdmdev-logs:/var/www/html/storage/logs
      # Bind-mount host .env so entrypoint can persist APP_KEY on first boot
      - ./.env:/var/www/html/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rdmdev-internal
      - nginx-proxy-manager_default
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  db:
    image: mysql:8.0
    container_name: rdmdev-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Root password required}
      MYSQL_DATABASE: ${DB_DATABASE:-rdmdev}
      MYSQL_USER: ${DB_USERNAME:-rdmdev}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - rdmdev-db:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - rdmdev-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scheduler:
    image: rdmdev-app:latest
    container_name: rdmdev-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rdmdev}
      - DB_USERNAME=${DB_USERNAME:-rdmdev}
      - DB_PASSWORD=${DB_PASSWORD:?Database password required}
    volumes:
      - rdmdev-storage:/var/www/html/storage/app
      - rdmdev-logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    entrypoint: []
    networks:
      - rdmdev-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

networks:
  rdmdev-internal:
    driver: bridge
  nginx-proxy-manager_default:
    external: true

volumes:
  rdmdev-db:
    driver: local
  rdmdev-storage:
    driver: local
  rdmdev-logs:
    driver: local
