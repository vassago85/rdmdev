# Local testing override — mirrors production but:
#  - Publishes on port 8086 (avoids mctactical-pos-web / bcsafaris on 8080,
#    and sits next to nrapa on 8085 in the local portmap)
#  - Does not reference the NPM external network
#  - No scheduler (keeps iteration fast)
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build app
#
# Then visit: http://localhost:8086
# NOTE: if you previously visited http://localhost:8080 while mctactical-pos
# was running, that SPA may have registered a service worker. Use an incognito
# window or clear site data for localhost before testing.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: rdmdev-app:local
    container_name: rdmdev-app-local
    restart: "no"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rdmdev}
      - DB_USERNAME=${DB_USERNAME:-rdmdev}
      - DB_PASSWORD=${DB_PASSWORD:?Database password required}
    ports:
      - "8086:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rdmdev-local

  db:
    image: mariadb:11
    container_name: rdmdev-db-local
    restart: "no"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Root password required}
      MARIADB_DATABASE: ${DB_DATABASE:-rdmdev}
      MARIADB_USER: ${DB_USERNAME:-rdmdev}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - rdmdev-db-local:/var/lib/mysql
    networks:
      - rdmdev-local
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  rdmdev-local:
    driver: bridge

volumes:
  rdmdev-db-local:
    driver: local
