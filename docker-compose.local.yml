# Local testing override — mirrors production but:
#  - Publishes port 8080 to host
#  - Does not reference the NPM external network
#  - No scheduler (keeps iteration fast)
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build app

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: rdmdev-app:local
    container_name: rdmdev-app-local
    restart: "no"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rdmdev}
      - DB_USERNAME=${DB_USERNAME:-rdmdev}
      - DB_PASSWORD=${DB_PASSWORD:?Database password required}
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rdmdev-local

  db:
    image: mysql:8.0
    container_name: rdmdev-db-local
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Root password required}
      MYSQL_DATABASE: ${DB_DATABASE:-rdmdev}
      MYSQL_USER: ${DB_USERNAME:-rdmdev}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - rdmdev-db-local:/var/lib/mysql
    networks:
      - rdmdev-local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  rdmdev-local:
    driver: bridge

volumes:
  rdmdev-db-local:
    driver: local
